<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하루 한 개 사자성어 · 60일 도전</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --hanji:#F8F3E7;
  --paper:#FFFDF6;
  --ink:#2A2E38;
  --jjok:#2E5077;      /* 쪽빛 남색 */
  --jjok-deep:#1E3A5C;
  --dancheong:#C6483A; /* 단청 붉은색 */
  --chija:#E9B44C;     /* 치자 노랑 */
  --line:#E4DAC4;
  --soft:#8A8271;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  font-family:"Noto Sans KR",sans-serif;color:var(--ink);
  background:var(--hanji);
  background-image:radial-gradient(circle at 20% 10%,rgba(255,255,255,.6),transparent 40%),
                   radial-gradient(circle at 90% 90%,rgba(233,180,76,.07),transparent 45%);
  min-height:100vh;
}
button{font-family:inherit;cursor:pointer;border:none;background:none}
.wrap{max-width:520px;margin:0 auto;padding:0 16px 90px}

/* 헤더 */
header{padding:18px 4px 10px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.app-title{font-family:"Noto Serif KR",serif;font-weight:900;font-size:20px;color:var(--jjok-deep);letter-spacing:-.5px}
.app-title small{display:block;font-family:"Noto Sans KR";font-weight:500;font-size:11px;color:var(--soft);letter-spacing:2px;margin-top:2px}
.header-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.pill{background:var(--paper);border:1.5px solid var(--line);border-radius:99px;padding:5px 11px;font-size:12px;font-weight:700;color:var(--jjok-deep);white-space:nowrap}
.pill.streak{color:var(--dancheong);border-color:#EAD3C6}
#teacher-indicator{display:none;background:var(--chija);color:#5C4708;border-color:#D9A63C}
.gear{font-size:18px;padding:4px}

/* 탭 뷰 */
.tab-view{display:none}
.tab-view.active{display:block;animation:fadein .25s ease}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* 히어로 카드 */
.hero-card{
  background:var(--paper);border:1.5px solid var(--line);border-radius:22px;
  padding:34px 22px 28px;text-align:center;margin-top:8px;
  box-shadow:0 8px 24px rgba(90,70,30,.07);position:relative;overflow:hidden;
}
.hero-card::before{content:"";position:absolute;inset:8px;border:1px solid var(--line);border-radius:16px;pointer-events:none;opacity:.7}
.day-eyebrow{font-size:12px;font-weight:900;letter-spacing:3px;color:var(--dancheong);margin-bottom:14px}
.hero-hanja{font-family:"Noto Serif KR",serif;font-weight:900;font-size:64px;color:var(--jjok-deep);line-height:1.1;margin:6px 0}
.hero-hanja.small{font-size:44px}
.hero-hanja.teaser{color:var(--line);font-size:80px}
.hero-idiom{font-size:22px;font-weight:900;color:var(--ink);margin-top:2px}
.hero-meaning{font-size:15px;color:var(--soft);margin-top:8px}
.hero-sub{font-size:14px;color:var(--soft);line-height:1.7;margin:14px 0 4px}
.stamp-mark{display:inline-block;margin-top:14px;color:var(--dancheong);border:2px solid var(--dancheong);border-radius:8px;padding:6px 14px;font-weight:900;font-size:14px;transform:rotate(-4deg)}
.done-all h2{font-family:"Noto Serif KR",serif;color:var(--jjok-deep);margin:12px 0 8px}
.done-all p{color:var(--soft);font-size:14px;line-height:1.7;margin-bottom:18px}
.hero-stamp{width:86px;height:86px;margin:0 auto;border-radius:50%;background:var(--dancheong);color:#fff;
  font-family:"Noto Serif KR",serif;font-weight:900;font-size:40px;display:flex;align-items:center;justify-content:center;transform:rotate(-6deg);box-shadow:0 4px 0 rgba(0,0,0,.08)}

/* 버튼 */
.btn-primary{
  display:inline-block;background:var(--jjok);color:#fff;font-weight:900;font-size:16px;
  border-radius:14px;padding:14px 28px;margin-top:18px;
  box-shadow:0 4px 0 var(--jjok-deep);transition:transform .1s;
}
.btn-primary:active{transform:translateY(3px);box-shadow:0 1px 0 var(--jjok-deep)}
.btn-primary.big{width:100%;padding:16px;font-size:17px}
.btn-ghost{display:inline-block;color:var(--soft);font-weight:700;font-size:14px;margin-top:12px;text-decoration:underline;text-underline-offset:3px}

/* 하단 내비 */
nav{position:fixed;bottom:0;left:0;right:0;background:var(--paper);border-top:1.5px solid var(--line);z-index:50}
.nav-inner{max-width:520px;margin:0 auto;display:flex}
.nav-btn{flex:1;padding:10px 0 12px;text-align:center;color:var(--soft);font-size:11px;font-weight:700}
.nav-btn .ico{display:block;font-size:20px;margin-bottom:2px;filter:grayscale(1);opacity:.55}
.nav-btn.active{color:var(--jjok-deep)}
.nav-btn.active .ico{filter:none;opacity:1}

/* 학습 오버레이 */
#learn-overlay{position:fixed;inset:0;background:var(--hanji);z-index:100;display:none;overflow-y:auto}
#learn-overlay.open{display:block}
.learn-inner{max-width:520px;margin:0 auto;padding:14px 18px 40px;min-height:100vh;display:flex;flex-direction:column}
.learn-top{display:flex;justify-content:space-between;align-items:center}
.close-x{font-size:22px;color:var(--soft);padding:6px 10px}
#learn-progress{display:flex;align-items:center;justify-content:center;gap:2px;margin:8px 0 4px;flex-wrap:wrap}
.prog-dot{font-size:10px;font-weight:700;color:#C9BFA8;background:var(--paper);border:1px solid var(--line);border-radius:99px;padding:3px 8px}
.prog-dot.on{color:#fff;background:var(--jjok);border-color:var(--jjok)}
.prog-dot.past{color:var(--jjok);border-color:var(--jjok)}
.prog-line{width:8px;height:1px;background:var(--line)}
.prog-review{font-size:10px;font-weight:900;color:var(--dancheong);margin-right:6px}
#learn-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:16px 0}
.step-eyebrow{font-size:12px;font-weight:900;letter-spacing:3px;color:var(--dancheong);margin-bottom:16px}

/* 카드 뒤집기 */
.flip-scene{perspective:900px;width:230px;height:290px;margin-bottom:18px}
.flip-card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .7s cubic-bezier(.2,.7,.3,1)}
.flip-card.flipped{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.flip-front{background:var(--jjok);color:#DCE6F2;font-weight:900;font-size:17px;line-height:1.6;box-shadow:0 8px 20px rgba(30,58,92,.25)}
.flip-front::after{content:"四字";font-family:"Noto Serif KR",serif;font-size:44px;opacity:.25;margin-top:8px}
.flip-back{background:var(--paper);border:1.5px solid var(--line);transform:rotateY(180deg);box-shadow:0 8px 20px rgba(90,70,30,.12)}
.big-hanja{font-family:"Noto Serif KR",serif;font-weight:900;font-size:46px;color:var(--jjok-deep);line-height:1.25}
.big-hanja.detail{font-size:40px;margin-top:6px}
.big-idiom{font-size:20px;font-weight:900}
.cat-tag{display:inline-block;font-size:11px;font-weight:700;color:var(--dancheong);background:#F7E8E0;border-radius:99px;padding:3px 10px}
.eumhun-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:6px}
.eum-chip{background:var(--paper);border:1.5px solid var(--line);border-radius:12px;padding:8px 10px;min-width:64px}
.eum-hanja{display:block;font-family:"Noto Serif KR",serif;font-weight:900;font-size:22px;color:var(--jjok-deep)}
.eum-txt{font-size:11px;color:var(--soft);font-weight:700}

/* 이야기 */
.story-idiom{font-family:"Noto Serif KR",serif;font-weight:900;font-size:22px;color:var(--jjok-deep);margin-bottom:14px}
.story-box{background:var(--paper);border:1.5px solid var(--line);border-radius:18px;padding:20px;width:100%;max-width:420px;text-align:left;min-height:120px}
.story-sent{font-size:15px;line-height:1.8;margin-bottom:10px;opacity:0;transform:translateY(8px);transition:all .4s ease}
.story-sent.show{opacity:1;transform:none}
.story-sent::before{content:"📖 ";font-size:13px}
.story-sent:not(:first-child)::before{content:""}

/* 이해 */
.meaning-card{background:var(--jjok);color:#fff;font-weight:900;font-size:17px;border-radius:14px;padding:16px 20px;max-width:420px;line-height:1.6}
.eumhun-grid{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:16px 0 4px}
.eum-card{background:var(--paper);border:1.5px solid var(--line);border-radius:14px;padding:12px 10px;min-width:72px}
.eum-card-hanja{font-family:"Noto Serif KR",serif;font-weight:900;font-size:30px;color:var(--jjok-deep)}
.eum-card-txt{font-size:12px;font-weight:700;color:var(--soft);margin-top:4px}
.example-line{font-size:14px;color:var(--soft);font-style:italic;margin-top:10px;line-height:1.7;max-width:420px}

/* 퀴즈 */
.quiz-q{font-size:18px;font-weight:900;margin-bottom:12px;line-height:1.5}
.quiz-meaning{background:var(--paper);border:1.5px solid var(--line);border-radius:14px;padding:14px 18px;font-size:15px;font-weight:700;color:var(--jjok-deep);margin-bottom:16px;max-width:420px;line-height:1.7}
.quiz-bigchar{font-family:"Noto Serif KR",serif;font-weight:900;font-size:70px;color:var(--jjok-deep);margin-bottom:12px}
.quiz-options{display:flex;flex-direction:column;gap:10px;width:100%;max-width:400px}
.quiz-opt{background:var(--paper);border:2px solid var(--line);border-radius:14px;padding:13px 16px;font-size:15px;font-weight:700;color:var(--ink);text-align:left;transition:border-color .15s}
.quiz-opt:not(:disabled):hover{border-color:var(--jjok)}
.quiz-opt.correct{border-color:#3E8E5A;background:#EDF7F0;color:#2C6B44}
.quiz-opt.wrong{border-color:var(--dancheong);background:#FBEEEC;color:var(--dancheong)}
.quiz-opt:disabled{cursor:default}
.fb{margin-top:14px;font-weight:900;font-size:15px}
.fb.ok{color:#2C6B44}.fb.no{color:var(--dancheong)}

/* 완료 도장 */
.stamp-zone{height:130px;display:flex;align-items:center;justify-content:center}
.stamp-seal{
  width:104px;height:104px;border-radius:22px;background:var(--dancheong);color:#fff;
  font-family:"Noto Serif KR",serif;font-weight:900;font-size:52px;
  display:flex;align-items:center;justify-content:center;transform:rotate(-6deg) scale(3);opacity:0;
  box-shadow:inset 0 0 0 4px rgba(255,255,255,.35);transition:all .45s cubic-bezier(.2,1.4,.4,1);
}
.stamp-seal.stamped{transform:rotate(-6deg) scale(1);opacity:1}
.done-title{font-family:"Noto Serif KR",serif;font-size:22px;color:var(--jjok-deep);margin:14px 0 6px}
.done-sub{font-size:14px;color:var(--soft);margin-bottom:12px}
.sentence-input{width:100%;max-width:400px;border:2px solid var(--line);border-radius:14px;padding:12px 14px;font-family:inherit;font-size:15px;resize:none;background:var(--paper)}
.sentence-input:focus{outline:2px solid var(--jjok);border-color:var(--jjok)}

/* 도감 */
.sec-head{display:flex;align-items:baseline;justify-content:space-between;margin:14px 4px 12px}
.sec-head h2{font-family:"Noto Serif KR",serif;font-size:19px;color:var(--jjok-deep)}
.sec-count{font-size:13px;font-weight:900;color:var(--dancheong)}
#collection-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.col-card{background:var(--paper);border:1.5px solid var(--line);border-radius:16px;padding:14px 6px 10px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:3px}
.col-card.got{border-color:#C9D6E4;box-shadow:0 3px 10px rgba(46,80,119,.08)}
.col-card.got:active{transform:scale(.97)}
.col-card.locked{opacity:.5}
.col-hanja{font-family:"Noto Serif KR",serif;font-weight:900;font-size:30px;color:var(--jjok-deep)}
.col-card.locked .col-hanja{color:#CCC2AC}
.col-name{font-size:13px;font-weight:900;color:var(--ink)}
.col-day{font-size:10px;font-weight:700;color:var(--soft);letter-spacing:1px}

/* 도장판 */
#board-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:4px}
.cell{aspect-ratio:1;border-radius:50%;border:1.5px dashed var(--line);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#C9BFA8;background:rgba(255,253,246,.6)}
.cell.done{border:none;background:var(--dancheong);color:#fff;font-family:"Noto Serif KR",serif;font-weight:900;font-size:17px;transform:rotate(-5deg);box-shadow:inset 0 0 0 2.5px rgba(255,255,255,.35)}
.cell.next{border:2px solid var(--chija);color:#B8862F;animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(233,180,76,.45)}50%{box-shadow:0 0 0 7px rgba(233,180,76,0)}}
#badge-row{display:flex;gap:10px;margin-top:20px}
.badge{flex:1;background:var(--paper);border:1.5px solid var(--line);border-radius:16px;padding:14px 6px;text-align:center;display:flex;flex-direction:column;gap:3px;font-size:13px;font-weight:900;color:#C0B69E}
.badge .badge-icon{font-size:24px;filter:grayscale(1);opacity:.4}
.badge .badge-at{font-size:10px;font-weight:700}
.badge.earned{color:var(--jjok-deep);border-color:var(--chija);background:#FDF7EA}
.badge.earned .badge-icon{filter:none;opacity:1}

/* 모달 */
.modal{position:fixed;inset:0;background:rgba(42,46,56,.45);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal.open{display:flex}
.modal-card{background:var(--paper);border-radius:24px 24px 0 0;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding:26px 22px 34px;text-align:center;animation:slideup .28s ease}
@keyframes slideup{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
.detail-sec{text-align:left;margin-top:16px;background:var(--hanji);border-radius:14px;padding:14px 16px}
.detail-sec h4{font-size:12px;font-weight:900;letter-spacing:2px;color:var(--dancheong);margin-bottom:6px}
.detail-sec p{font-size:14px;line-height:1.75}
.detail-sec .ex{font-style:italic;color:var(--jjok-deep)}
.detail-sec.mine{background:#FDF7EA;border:1.5px solid var(--chija)}
.titleup-icon{font-size:56px}
.titleup-name{font-family:"Noto Serif KR",serif;font-weight:900;font-size:24px;color:var(--dancheong);margin:8px 0}
#titleup-body h3{margin-top:8px}
#titleup-body p{color:var(--soft);font-size:14px;margin-top:6px}

/* 설정 */
.set-row{display:flex;align-items:center;justify-content:space-between;background:var(--hanji);border-radius:14px;padding:14px 16px;margin-top:12px;text-align:left}
.set-row .lbl{font-weight:900;font-size:15px}
.set-row .desc{font-size:12px;color:var(--soft);margin-top:2px}
.switch{position:relative;width:50px;height:28px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:#D9CFB8;border-radius:99px;transition:.2s;cursor:pointer}
.slider::before{content:"";position:absolute;width:22px;height:22px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.2s}
.switch input:checked + .slider{background:var(--jjok)}
.switch input:checked + .slider::before{transform:translateX(22px)}
.danger-link{color:var(--dancheong);font-size:13px;font-weight:700;margin-top:18px;text-decoration:underline;text-underline-offset:3px}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
}
@media (min-width:560px){
  #collection-grid{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="app-title">하루 한 개 사자성어<small>60일 도전</small></div>
    <div class="header-right">
      <span class="pill" id="teacher-indicator">👩‍🏫 선생님</span>
      <span class="pill streak" id="streak-badge">🔥 0일</span>
      <span class="pill" id="title-badge">✏️ 입문자</span>
      <button class="gear" onclick="openSettings()" aria-label="설정">⚙️</button>
    </div>
  </header>

  <main>
    <section id="view-today" class="tab-view active"><div id="today-content"></div></section>

    <section id="view-collection" class="tab-view">
      <div class="sec-head"><h2>사자성어 도감</h2><span class="sec-count" id="collection-count">0 / 60</span></div>
      <div id="collection-grid"></div>
    </section>

    <section id="view-board" class="tab-view">
      <div class="sec-head"><h2>도장판</h2><span class="sec-count" id="board-count"></span></div>
      <div id="board-grid"></div>
      <div id="badge-row"></div>
    </section>
  </main>
</div>

<nav>
  <div class="nav-inner">
    <button class="nav-btn active" id="nav-today" onclick="showTab('today')"><span class="ico">📖</span>오늘</button>
    <button class="nav-btn" id="nav-collection" onclick="showTab('collection')"><span class="ico">🎴</span>도감</button>
    <button class="nav-btn" id="nav-board" onclick="showTab('board')"><span class="ico">🔴</span>도장판</button>
  </div>
</nav>

<div id="learn-overlay">
  <div class="learn-inner">
    <div class="learn-top">
      <div id="learn-progress"></div>
      <button class="close-x" onclick="if(confirm('학습을 중단할까요? 진행 내용은 저장되지 않아요.'))closeLearn()" aria-label="닫기">✕</button>
    </div>
    <div id="learn-body"></div>
  </div>
</div>

<div class="modal" id="detail-modal" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal-card" id="detail-body"></div>
</div>

<div class="modal" id="titleup-modal">
  <div class="modal-card" id="titleup-body"></div>
</div>

<div class="modal" id="settings-modal" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal-card">
    <h3 style="font-family:'Noto Serif KR',serif;color:var(--jjok-deep)">설정</h3>
    <div class="set-row">
      <div><div class="lbl">선생님 모드</div><div class="desc">하루 1개 제한 없이 계속 학습할 수 있어요 (수업 시연용)</div></div>
      <label class="switch"><input type="checkbox" id="teacher-toggle" onchange="toggleTeacher(this)"><span class="slider"></span></label>
    </div>
    <button class="danger-link" onclick="resetAll()">기록 모두 지우고 처음부터</button><br>
    <button class="btn-primary" onclick="el('settings-modal').classList.remove('open')">닫기</button>
  </div>
</div>

<script>
const IDIOMS = [{"day":1,"idiom":"각고면려","hanja":"刻苦勉勵","eumhun":"刻(새길 각) 苦(쓸 고) 勉(힘쓸 면) 勵(힘쓸 려)","meaning":"몹시 애쓰고 힘써 노력함","story":"옛날 학문에 힘쓰던 선비들이 몸이 힘들어도 참고 견디며 공부에 힘썼다는 데서 나온 말이에요. '각고'는 뼈를 깎듯이 애쓴다는 뜻이랍니다.","example":"나는 이번 시험을 위해 각고면려하며 매일 밤늦게까지 공부했다.","category":"노력·배움"},{"day":2,"idiom":"온고지신","hanja":"溫故知新","eumhun":"溫(익힐 온) 故(옛 고) 知(알 지) 新(새 신)","meaning":"옛것을 익혀서 새것을 앎","story":"공자님이 논어에서 하신 말씀이에요. 옛 학문을 잘 배워두면 그것이 바탕이 되어 새로운 지혜를 얻을 수 있다고 가르치셨답니다.","example":"할머니의 옛날이야기에서 온고지신의 지혜를 배웠다.","category":"노력·배움"},{"day":3,"idiom":"주경야독","hanja":"晝耕夜讀","eumhun":"晝(낮 주) 耕(밭갈 경) 夜(밤 야) 讀(읽을 독)","meaning":"낮에는 일하고 밤에는 글을 읽음","story":"옛날 가난한 선비가 낮에는 농사를 짓고 밤에는 등불 아래에서 책을 읽으며 공부했다는 데서 유래했어요.","example":"형은 낮에는 아르바이트를 하고 밤에는 공부하는 주경야독의 생활을 하고 있다.","category":"노력·배움"},{"day":4,"idiom":"형설지공","hanja":"螢雪之功","eumhun":"螢(반딧불 형) 雪(눈 설) 之(갈 지) 功(공 공)","meaning":"고생하며 부지런히 공부한 보람","story":"중국 진나라의 차윤은 반딧불을 모아 그 빛으로, 손강은 겨울 눈빛에 책을 비추어 읽으며 공부해 훗날 훌륭한 사람이 되었다는 이야기에서 나왔어요.","example":"그는 어려운 형편에도 형설지공으로 노력해 결국 꿈을 이루었다.","category":"노력·배움"},{"day":5,"idiom":"대기만성","hanja":"大器晩成","eumhun":"大(큰 대) 器(그릇 기) 晩(늦을 만) 成(이룰 성)","meaning":"큰 그릇은 늦게 이루어짐","story":"노자의 도덕경에 나오는 말이에요. 큰 종이나 큰 그릇을 만들려면 시간이 오래 걸리듯, 크게 될 사람은 늦게 성공한다는 뜻이랍니다.","example":"지금은 부족해도 대기만성이라 했으니 포기하지 말고 계속 노력하자.","category":"노력·배움"},{"day":6,"idiom":"일취월장","hanja":"日就月將","eumhun":"日(날 일) 就(나아갈 취) 月(달 월) 將(나아갈 장)","meaning":"날마다 달마다 발전해 나감","story":"옛 시집인 시경에서 나온 말로, 학문이나 실력이 날이 가고 달이 갈수록 눈에 띄게 발전하는 모습을 표현했어요.","example":"꾸준히 연습했더니 줄넘기 실력이 일취월장했다.","category":"노력·배움"},{"day":7,"idiom":"우공이산","hanja":"愚公移山","eumhun":"愚(어리석을 우) 公(공변될 공) 移(옮길 이) 山(뫼 산)","meaning":"꾸준히 노력하면 큰 일도 이룸","story":"옛날 우공이라는 노인이 집 앞을 가로막은 큰 산을 자손 대대로 옮기겠다며 매일 흙을 파냈어요. 그 정성에 감동한 옥황상제가 결국 산을 옮겨주었다는 열자의 이야기랍니다.","example":"우공이산의 마음으로 조금씩 방을 정리하다 보니 어느새 깨끗해졌다.","category":"노력·배움"},{"day":8,"idiom":"불철주야","hanja":"不撤晝夜","eumhun":"不(아닐 불) 撤(거둘 철) 晝(낮 주) 夜(밤 야)","meaning":"밤낮을 가리지 않음","story":"'거둘 철'을 쓰지 않는다는 것은 낮과 밤을 나누지 않는다는 뜻으로, 한 가지 일에 정성을 다해 몰두하는 모습을 나타내요.","example":"소방관들은 불철주야 화재 현장에서 사람들을 구했다.","category":"노력·배움"},{"day":9,"idiom":"절차탁마","hanja":"切磋琢磨","eumhun":"切(끊을 절) 磋(갈 차) 琢(다듬을 탁) 磨(갈 마)","meaning":"학문과 인격을 끊임없이 갈고닦음","story":"시경에서 나온 말로, 옥돌을 자르고(切) 줄로 갈고(磋) 정으로 쪼고(琢) 광을 내는(磨) 과정을 학문을 닦는 것에 빗댄 표현이에요.","example":"우리 반은 발표 대회를 앞두고 절차탁마의 자세로 연습을 거듭했다.","category":"노력·배움"},{"day":10,"idiom":"자강불식","hanja":"自强不息","eumhun":"自(스스로 자) 强(굳셀 강) 不(아닐 불) 息(쉴 식)","meaning":"스스로 힘써 쉬지 않음","story":"주역에 나오는 말로, 하늘이 쉬지 않고 움직이듯 사람도 스스로 힘써 노력을 멈추지 말아야 한다는 가르침이에요.","example":"그 선수는 부상을 이겨내고 자강불식하며 재기에 성공했다.","category":"노력·배움"},{"day":11,"idiom":"죽마고우","hanja":"竹馬故友","eumhun":"竹(대 죽) 馬(말 마) 故(옛 고) 友(벗 우)","meaning":"어릴 때부터 친하게 지낸 친구","story":"대나무 막대를 말처럼 다리 사이에 끼우고 놀던 어린 시절 친구라는 뜻으로, 중국 진서의 이야기에서 유래했어요.","example":"우리는 유치원 때부터 함께한 죽마고우 사이다.","category":"우정·인간관계"},{"day":12,"idiom":"관포지교","hanja":"管鮑之交","eumhun":"管(대롱 관) 鮑(절인고기 포) 之(갈 지) 交(사귈 교)","meaning":"매우 친하고 두터운 우정","story":"중국 제나라의 관중과 포숙아는 어려서부터 친구였는데, 포숙아는 관중이 실수해도 늘 그의 사정을 헤아려 이해해 주었어요. 이 둘의 깊은 우정에서 나온 말이랍니다.","example":"두 친구의 우정은 마치 관포지교와 같아서 모두가 부러워한다.","category":"우정·인간관계"},{"day":13,"idiom":"금란지교","hanja":"金蘭之交","eumhun":"金(쇠 금) 蘭(난초 란) 之(갈 지) 交(사귈 교)","meaning":"쇠처럼 굳고 난초처럼 향기로운 우정","story":"주역에서 나온 말로, 두 사람의 마음이 하나로 합해지면 쇠도 자를 만큼 강해지고, 그 우정에서 나오는 말은 난초처럼 향기롭다는 뜻이에요.","example":"그녀와 나는 금란지교를 나누는 소중한 친구다.","category":"우정·인간관계"},{"day":14,"idiom":"동고동락","hanja":"同苦同樂","eumhun":"同(한가지 동) 苦(쓸 고) 同(한가지 동) 樂(즐길 락)","meaning":"괴로움도 즐거움도 함께함","story":"힘든 일과 기쁜 일을 늘 함께 나눈다는 뜻으로, 오랫동안 어려움을 함께 겪은 사이의 끈끈함을 나타내는 말이에요.","example":"우리 축구팀은 동고동락하며 우승의 기쁨을 함께 맛보았다.","category":"우정·인간관계"},{"day":15,"idiom":"십시일반","hanja":"十匙一飯","eumhun":"十(열 십) 匙(숟가락 시) 一(한 일) 飯(밥 반)","meaning":"여럿이 조금씩 힘을 모으면 한 사람을 돕기 쉬움","story":"열 사람이 밥 한 숟가락씩만 보태도 밥 한 그릇이 채워진다는 뜻에서 나온 말이에요. 작은 정성도 여럿이 모이면 큰 힘이 된답니다.","example":"친구들이 십시일반으로 용돈을 모아 어려운 이웃을 도왔다.","category":"우정·인간관계"},{"day":16,"idiom":"이심전심","hanja":"以心傳心","eumhun":"以(써 이) 心(마음 심) 傳(전할 전) 心(마음 심)","meaning":"말하지 않아도 마음이 서로 통함","story":"불교에서 스승이 말이 아닌 마음으로 제자에게 깨달음을 전했다는 데서 나온 말로, 굳이 설명하지 않아도 서로의 뜻이 통함을 뜻해요.","example":"우리는 눈빛만 봐도 이심전심으로 통한다.","category":"우정·인간관계"},{"day":17,"idiom":"일심동체","hanja":"一心同體","eumhun":"一(한 일) 心(마음 심) 同(한가지 동) 體(몸 체)","meaning":"한마음 한몸처럼 뜻이 하나임","story":"여러 사람의 마음과 몸이 마치 하나가 된 것처럼 뜻을 모아 행동하는 모습을 나타내는 말이에요.","example":"우리 모둠은 일심동체가 되어 과학 발명품을 완성했다.","category":"우정·인간관계"},{"day":18,"idiom":"화기애애","hanja":"和氣靄靄","eumhun":"和(화할 화) 氣(기운 기) 靄(아지랑이 애) 靄(아지랑이 애)","meaning":"화목하고 부드러운 분위기","story":"봄날 부드러운 기운이 안개처럼 은은히 감도는 모습을 사람들 사이의 다정하고 화목한 분위기에 빗댄 표현이에요.","example":"우리 반은 늘 화기애애한 분위기 속에서 수업을 한다.","category":"우정·인간관계"},{"day":19,"idiom":"막역지우","hanja":"莫逆之友","eumhun":"莫(없을 막) 逆(거스를 역) 之(갈 지) 友(벗 우)","meaning":"허물없이 아주 친한 친구","story":"장자에 나오는 말로, 서로 뜻이 잘 맞아 조금도 어긋남이 없는 친구 사이를 뜻해요.","example":"그와 나는 막역지우라서 무슨 이야기든 편하게 나눈다.","category":"우정·인간관계"},{"day":20,"idiom":"상부상조","hanja":"相扶相助","eumhun":"相(서로 상) 扶(도울 부) 相(서로 상) 助(도울 조)","meaning":"서로서로 도움","story":"우리 조상들이 두레와 품앗이로 농사일을 함께 나누어 하던 전통에서 비롯된, 서로 돕고 살자는 정신을 담은 말이에요.","example":"우리 마을 사람들은 상부상조하며 어려운 시기를 함께 이겨냈다.","category":"우정·인간관계"},{"day":21,"idiom":"반포지효","hanja":"反哺之孝","eumhun":"反(돌이킬 반) 哺(먹일 포) 之(갈 지) 孝(효도 효)","meaning":"자식이 부모의 은혜에 보답하는 효심","story":"까마귀 새끼는 어릴 때 어미가 먹여주지만, 다 자란 뒤에는 늙은 어미에게 먹이를 물어다 준다는 이야기에서 나온 말이에요.","example":"그는 반포지효의 마음으로 부모님을 정성껏 모셨다.","category":"효도·가족"},{"day":22,"idiom":"가화만사성","hanja":"家和萬事成","eumhun":"家(집 가) 和(화할 화) 萬(일만 만) 事(일 사) 成(이룰 성)","meaning":"집안이 화목하면 모든 일이 잘됨","story":"가정이 화목해야 그 안의 사람들이 힘을 얻어 밖에서도 하는 일마다 잘 풀린다는 뜻을 담은 말이에요.","example":"가화만사성이라고, 가족이 화목해야 무슨 일이든 잘 풀린다.","category":"효도·가족"},{"day":23,"idiom":"부전자전","hanja":"父傳子傳","eumhun":"父(아비 부) 傳(전할 전) 子(아들 자) 傳(전할 전)","meaning":"아버지의 성질이나 재주가 아들에게 이어짐","story":"아버지에게서 아들로 대대로 성격이나 재주가 전해진다는 뜻에서 나온 말로, 지금은 부모와 자녀가 닮은 경우에 두루 쓰여요.","example":"요리를 잘하는 아빠를 닮아 나도 요리를 좋아하니 부전자전인가 보다.","category":"효도·가족"},{"day":24,"idiom":"혼정신성","hanja":"昏定晨省","eumhun":"昏(어두울 혼) 定(정할 정) 晨(새벽 신) 省(살필 성)","meaning":"부모님께 아침저녁으로 문안드림","story":"예기에 나오는 말로, 저녁에는 부모님의 잠자리를 살펴드리고 새벽에는 밤새 안녕하셨는지 문안을 여쭙는다는 뜻이에요.","example":"옛 선비들은 혼정신성의 예절로 부모님을 극진히 모셨다.","category":"효도·가족"},{"day":25,"idiom":"동상이몽","hanja":"同床異夢","eumhun":"同(한가지 동) 床(평상 상) 異(다를 이) 夢(꿈 몽)","meaning":"겉은 같이 있어도 속마음은 서로 다름","story":"같은 침상에서 함께 자면서도 저마다 다른 꿈을 꾼다는 뜻으로, 겉으로는 함께하지만 생각이 다른 경우를 이르는 말이에요.","example":"같은 반 발표를 준비하면서도 우리 모둠은 동상이몽이라 의견이 자꾸 엇갈렸다.","category":"효도·가족"},{"day":26,"idiom":"고진감래","hanja":"苦盡甘來","eumhun":"苦(쓸 고) 盡(다할 진) 甘(달 감) 來(올 래)","meaning":"고생 끝에 즐거움이 옴","story":"쓴맛이 다하면 단맛이 온다는 뜻으로, 힘든 과정을 견디고 나면 좋은 결과가 찾아온다는 것을 표현한 말이에요.","example":"고진감래라더니 열심히 연습한 끝에 대회에서 상을 받았다.","category":"결실·성공"},{"day":27,"idiom":"새옹지마","hanja":"塞翁之馬","eumhun":"塞(변방 새) 翁(늙은이 옹) 之(갈 지) 馬(말 마)","meaning":"인생의 좋고 나쁨은 예측하기 어려움","story":"중국 변방에 살던 노인의 말이 도망갔다가 좋은 말을 데리고 돌아왔어요. 그런데 그 말을 타던 아들이 다리를 다쳤지만, 덕분에 전쟁에 나가지 않아 목숨을 건졌다는 회남자의 이야기에서 나왔답니다.","example":"시험에서 떨어져 속상했지만 새옹지마라고, 그 덕분에 더 좋은 길을 찾았다.","category":"결실·성공"},{"day":28,"idiom":"전화위복","hanja":"轉禍爲福","eumhun":"轉(구를 전) 禍(재앙 화) 爲(할 위) 福(복 복)","meaning":"나쁜 일이 오히려 좋은 일로 바뀜","story":"재앙이 굴러서 복으로 바뀐다는 뜻으로, 힘든 일이 오히려 좋은 결과로 이어지는 경우에 쓰는 말이에요.","example":"다리를 다쳐 쉬는 동안 책을 많이 읽게 되어 전화위복이 되었다.","category":"결실·성공"},{"day":29,"idiom":"와신상담","hanja":"臥薪嘗膽","eumhun":"臥(누울 와) 薪(섶 신) 嘗(맛볼 상) 膽(쓸개 담)","meaning":"목표를 이루려고 어려움을 참고 견딤","story":"중국 오나라 왕 부차는 원수를 잊지 않으려고 딱딱한 장작 위에서 잠을 잤고, 이를 갚으려던 월나라 왕 구천은 쓴 쓸개를 매일 맛보며 마음을 다잡았다는 고사에서 나왔어요.","example":"그는 지난 대회의 실패를 잊지 않고 와신상담하며 훈련에 매진했다.","category":"결실·성공"},{"day":30,"idiom":"금의환향","hanja":"錦衣還鄕","eumhun":"錦(비단 금) 衣(옷 의) 還(돌아올 환) 鄕(고향 향)","meaning":"성공하여 떳떳하게 고향에 돌아옴","story":"비단옷을 입고 고향에 돌아온다는 뜻으로, 옛날에는 비단옷이 신분과 성공을 상징했기 때문에 나온 표현이에요.","example":"올림픽에서 금메달을 딴 선수가 금의환향하여 고향 사람들의 환영을 받았다.","category":"결실·성공"},{"day":31,"idiom":"유비무환","hanja":"有備無患","eumhun":"有(있을 유) 備(갖출 비) 無(없을 무) 患(근심 환)","meaning":"미리 준비하면 걱정할 것이 없음","story":"옛 역사책 서경에서 나온 말로, 어떤 일이든 미리 대비해두면 나중에 근심할 일이 생기지 않는다는 지혜를 담고 있어요.","example":"유비무환이라고, 미리 우산을 챙겨서 갑자기 비가 와도 걱정없었다.","category":"신중함·조심성"},{"day":32,"idiom":"다다익선","hanja":"多多益善","eumhun":"多(많을 다) 多(많을 다) 益(더할 익) 善(좋을 선)","meaning":"많으면 많을수록 좋음","story":"한나라의 장수 한신이 임금에게 '병사는 많으면 많을수록 지휘하기 좋습니다'라고 답한 데서 나온 말이에요.","example":"책은 다다익선이라 생각해서 도서관에서 여러 권을 빌려왔다.","category":"신중함·조심성"},{"day":33,"idiom":"과유불급","hanja":"過猶不及","eumhun":"過(지날 과) 猶(오히려 유) 不(아닐 불) 及(미칠 급)","meaning":"지나친 것은 부족한 것만 못함","story":"논어에서 공자님이 제자에게 지나치게 넘치는 것과 모자란 것은 결국 다르지 않다고 가르치신 데서 나온 말이에요.","example":"운동도 과유불급이라고, 너무 무리하면 오히려 몸에 해롭다.","category":"신중함·조심성"},{"day":34,"idiom":"일석이조","hanja":"一石二鳥","eumhun":"一(한 일) 石(돌 석) 二(두 이) 鳥(새 조)","meaning":"한 가지 일로 두 가지 이익을 얻음","story":"돌 하나를 던져서 새 두 마리를 한꺼번에 잡는다는 뜻으로, 한 번의 노력으로 두 가지 좋은 결과를 얻는 것을 말해요.","example":"걸어서 등교하면 건강도 챙기고 시간도 절약하니 일석이조다.","category":"신중함·조심성"},{"day":35,"idiom":"호시탐탐","hanja":"虎視眈眈","eumhun":"虎(범 호) 視(볼 시) 眈(노려볼 탐) 眈(노려볼 탐)","meaning":"기회를 노리며 형세를 살핌","story":"주역에서 나온 말로, 호랑이가 먹잇감을 뚫어지게 노려보는 모습처럼 날카롭게 기회를 살피는 모습을 나타내요.","example":"상대팀은 우리 팀의 실수를 호시탐탐 노리고 있었다.","category":"신중함·조심성"},{"day":36,"idiom":"언행일치","hanja":"言行一致","eumhun":"言(말씀 언) 行(다닐 행) 一(한 일) 致(이를 치)","meaning":"말과 행동이 서로 들어맞음","story":"말한 대로 행동하는 것을 중요한 인격의 덕목으로 여겼던 유교의 가르침에서 강조된 말이에요.","example":"그 친구는 언행일치하는 사람이라 늘 믿음이 간다.","category":"언행·태도"},{"day":37,"idiom":"솔선수범","hanja":"率先垂範","eumhun":"率(거느릴 솔) 先(먼저 선) 垂(드리울 수) 範(법 범)","meaning":"앞장서서 모범을 보임","story":"지도자가 스스로 앞장서서 행동하여 다른 사람들에게 본보기가 되어야 한다는 뜻을 담은 말이에요.","example":"반장은 청소 시간마다 솔선수범하여 먼저 빗자루를 든다.","category":"언행·태도"},{"day":38,"idiom":"자업자득","hanja":"自業自得","eumhun":"自(스스로 자) 業(업 업) 自(스스로 자) 得(얻을 득)","meaning":"자기가 저지른 일의 결과를 자기가 받음","story":"불교에서 나온 말로, 스스로 지은 행동의 결과는 결국 자기 자신에게 돌아온다는 가르침이에요.","example":"숙제를 미루다가 밤새워 해야 했으니 자업자득이었다.","category":"언행·태도"},{"day":39,"idiom":"역지사지","hanja":"易地思之","eumhun":"易(바꿀 역) 地(땅 지) 思(생각 사) 之(갈 지)","meaning":"처지를 바꾸어 상대방의 입장에서 생각함","story":"맹자에서 나온 말로, 서로의 처지를 바꾸어 생각해 보면 상대를 더 잘 이해할 수 있다는 뜻이에요.","example":"친구와 다툴 때는 역지사지의 마음으로 상대 입장을 생각해보자.","category":"언행·태도"},{"day":40,"idiom":"표리부동","hanja":"表裏不同","eumhun":"表(겉 표) 裏(속 리) 不(아닐 부) 同(한가지 동)","meaning":"겉과 속마음이 서로 다름","story":"겉으로 드러나는 모습과 마음속 생각이 일치하지 않는다는 뜻으로, 진실하지 못한 태도를 경계하는 말이에요.","example":"표리부동한 사람은 결국 친구들의 믿음을 잃게 된다.","category":"언행·태도"},{"day":41,"idiom":"허심탄회","hanja":"虛心坦懷","eumhun":"虛(빌 허) 心(마음 심) 坦(평평할 탄) 懷(품을 회)","meaning":"마음속 생각을 솔직하게 터놓음","story":"마음을 비우고(虛心) 품은 생각을 평평하게 펼쳐놓는다(坦懷)는 뜻으로, 거리낌 없이 솔직하게 이야기하는 태도를 말해요.","example":"우리는 오해를 풀기 위해 허심탄회하게 이야기를 나누었다.","category":"언행·태도"},{"day":42,"idiom":"감언이설","hanja":"甘言利說","eumhun":"甘(달 감) 言(말씀 언) 利(이로울 이) 說(말씀 설)","meaning":"남을 꾀는 달콤한 말","story":"달콤하고 이로운 것처럼 들리는 말로 남을 속여 꾀어낸다는 뜻으로, 좋지 않은 의도를 가진 말을 경계하라는 뜻이에요.","example":"낯선 사람의 감언이설에 속지 않도록 조심해야 한다.","category":"언행·태도"},{"day":43,"idiom":"유언비어","hanja":"流言蜚語","eumhun":"流(흐를 유) 言(말씀 언) 蜚(날 비) 語(말씀 어)","meaning":"근거 없이 떠도는 소문","story":"흐르는 물처럼, 또 날아다니는 것처럼 정확한 출처 없이 퍼져나가는 소문을 가리키는 말이에요.","example":"확인되지 않은 유언비어를 함부로 퍼뜨리면 안 된다.","category":"언행·태도"},{"day":44,"idiom":"일언지하","hanja":"一言之下","eumhun":"一(한 일) 言(말씀 언) 之(갈 지) 下(아래 하)","meaning":"한마디로 딱 잘라 말함","story":"'한마디 말 아래'라는 뜻으로, 여러 말 하지 않고 단번에 결론을 내려 말하는 것을 뜻해요.","example":"그는 내 부탁을 일언지하에 거절했다.","category":"언행·태도"},{"day":45,"idiom":"개과천선","hanja":"改過遷善","eumhun":"改(고칠 개) 過(허물 과) 遷(옮길 천) 善(착할 선)","meaning":"잘못을 고쳐 착하게 됨","story":"옛 역사책 진서에 나오는 말로, 지난날의 허물을 뉘우치고 스스로 옮겨가듯 착한 사람으로 거듭나는 것을 뜻해요.","example":"말썽꾸러기였던 그 친구는 개과천선하여 모범생이 되었다.","category":"언행·태도"},{"day":46,"idiom":"춘하추동","hanja":"春夏秋冬","eumhun":"春(봄 춘) 夏(여름 하) 秋(가을 추) 冬(겨울 동)","meaning":"봄, 여름, 가을, 겨울의 네 계절","story":"자연의 사계절을 순서대로 나타낸 말로, 계절이 규칙적으로 순환하는 자연의 이치를 담고 있어요.","example":"우리나라는 춘하추동 사계절이 뚜렷하게 나타난다.","category":"자연·계절"},{"day":47,"idiom":"설상가상","hanja":"雪上加霜","eumhun":"雪(눈 설) 上(위 상) 加(더할 가) 霜(서리 상)","meaning":"어려운 일이 겹쳐서 일어남","story":"이미 쌓인 눈 위에 다시 서리까지 더해진다는 뜻으로, 나쁜 일에 나쁜 일이 또 겹치는 상황을 표현한 말이에요.","example":"비가 와서 소풍이 취소됐는데 설상가상으로 감기까지 걸렸다.","category":"자연·계절"},{"day":48,"idiom":"청천벽력","hanja":"靑天霹靂","eumhun":"靑(푸를 청) 天(하늘 천) 霹(벼락 벽) 靂(벼락 력)","meaning":"뜻밖에 일어난 큰 사건","story":"맑게 갠 푸른 하늘에서 갑자기 벼락이 친다는 뜻으로, 전혀 예상하지 못한 놀라운 일을 가리키는 말이에요.","example":"갑작스러운 전학 소식은 우리 반 친구들에게 청천벽력 같은 일이었다.","category":"자연·계절"},{"day":49,"idiom":"금상첨화","hanja":"錦上添花","eumhun":"錦(비단 금) 上(위 상) 添(더할 첨) 花(꽃 화)","meaning":"좋은 일에 또 좋은 일이 더해짐","story":"아름다운 비단 위에 예쁜 꽃까지 더한다는 뜻으로, 이미 좋은 상황에 더 좋은 일이 겹치는 경우를 말해요.","example":"상을 받은 데다 칭찬까지 받았으니 금상첨화가 따로 없다.","category":"자연·계절"},{"day":50,"idiom":"화조월석","hanja":"花朝月夕","eumhun":"花(꽃 화) 朝(아침 조) 月(달 월) 夕(저녁 석)","meaning":"자연이 아름다운 좋은 시절","story":"꽃 피는 아침과 달 밝은 저녁이라는 뜻으로, 경치가 가장 아름다운 봄가을의 좋은 때를 이르는 말이에요.","example":"화조월석 봄날, 우리 가족은 공원으로 나들이를 갔다.","category":"자연·계절"},{"day":51,"idiom":"초지일관","hanja":"初志一貫","eumhun":"初(처음 초) 志(뜻 지) 一(한 일) 貫(꿸 관)","meaning":"처음에 세운 뜻을 끝까지 밀고 나감","story":"처음 마음먹은 뜻을 실 하나로 꿰듯 끝까지 흔들림 없이 지켜나간다는 뜻이에요.","example":"그는 초지일관 화가의 꿈을 향해 그림을 그려왔다.","category":"학교생활·태도"},{"day":52,"idiom":"작심삼일","hanja":"作心三日","eumhun":"作(지을 작) 心(마음 심) 三(석 삼) 日(날 일)","meaning":"결심이 오래가지 못함","story":"굳게 먹은 마음도 삼 일을 넘기지 못하고 흐지부지된다는 뜻으로, 결심이 쉽게 흔들리는 모습을 재미있게 표현한 말이에요.","example":"새해 다짐이 작심삼일이 되지 않도록 계획을 꾸준히 지켜보자.","category":"학교생활·태도"},{"day":53,"idiom":"타산지석","hanja":"他山之石","eumhun":"他(다를 타) 山(뫼 산) 之(갈 지) 石(돌 석)","meaning":"남의 작은 잘못도 나를 돌아보는 데 도움이 됨","story":"시경에서 나온 말로, 다른 산의 보잘것없는 돌도 가져다가 자기 옥돌을 가는 데 쓸 수 있다는 뜻에서 유래했어요.","example":"친구의 실수를 타산지석으로 삼아 나는 같은 실수를 하지 않았다.","category":"학교생활·태도"},{"day":54,"idiom":"입신양명","hanja":"立身揚名","eumhun":"立(설 입) 身(몸 신) 揚(날릴 양) 名(이름 명)","meaning":"훌륭하게 되어 이름을 세상에 널리 알림","story":"효경에서 나온 말로, 자신을 잘 세워 큰 업적을 이루고 그 이름을 부모님께 자랑스럽게 알리는 것을 뜻해요.","example":"옛사람들은 과거에 급제해 입신양명하는 것을 큰 자랑으로 여겼다.","category":"학교생활·태도"},{"day":55,"idiom":"박학다식","hanja":"博學多識","eumhun":"博(넓을 박) 學(배울 학) 多(많을 다) 識(알 식)","meaning":"학식이 넓고 아는 것이 많음","story":"배움의 폭이 넓고(博學) 아는 지식이 많다(多識)는 뜻으로, 다방면에 지식이 풍부한 사람을 칭찬할 때 쓰는 말이에요.","example":"박학다식한 선생님 덕분에 궁금한 것을 무엇이든 배울 수 있었다.","category":"학교생활·태도"},{"day":56,"idiom":"문일지십","hanja":"聞一知十","eumhun":"聞(들을 문) 一(한 일) 知(알 지) 十(열 십)","meaning":"하나를 들으면 열을 미루어 앎","story":"논어에서 공자님이 제자 안회를 칭찬하며 하신 말씀으로, 매우 총명하여 조금만 배워도 많은 것을 깨우친다는 뜻이에요.","example":"그 친구는 문일지십이라 할 만큼 설명을 조금만 들어도 금방 이해한다.","category":"학교생활·태도"},{"day":57,"idiom":"불치하문","hanja":"不恥下問","eumhun":"不(아닐 불) 恥(부끄러울 치) 下(아래 하) 問(물을 문)","meaning":"아랫사람에게 묻는 것을 부끄러워하지 않음","story":"논어에서 나온 말로, 진짜 배움을 아는 사람은 자기보다 못하다고 여겨지는 사람에게 묻는 것도 부끄러워하지 않는다는 가르침이에요.","example":"모르는 것은 후배에게라도 불치하문의 자세로 물어보아야 한다.","category":"학교생활·태도"},{"day":58,"idiom":"살신성인","hanja":"殺身成仁","eumhun":"殺(죽일 살) 身(몸 신) 成(이룰 성) 仁(어질 인)","meaning":"자신을 희생해서라도 옳은 일을 이룸","story":"논어에서 나온 말로, 진정한 어짊(仁)을 이루기 위해서는 자기 한 몸의 희생도 마다하지 않는다는 큰 뜻을 담고 있어요.","example":"소방관들은 살신성인의 정신으로 위험한 화재 현장에 뛰어든다.","category":"학교생활·태도"},{"day":59,"idiom":"백문불여일견","hanja":"百聞不如一見","eumhun":"百(일백 백) 聞(들을 문) 不(아닐 불) 如(같을 여) 一(한 일) 見(볼 견)","meaning":"백 번 듣는 것이 한 번 보는 것만 못함","story":"옛 역사책 한서에서 나온 말로, 아무리 여러 번 이야기를 들어도 직접 눈으로 보고 경험하는 것만 못하다는 뜻이에요.","example":"백문불여일견이라고, 사진으로 보던 유적지를 직접 가 보니 훨씬 감동적이었다.","category":"학교생활·태도"},{"day":60,"idiom":"마이동풍","hanja":"馬耳東風","eumhun":"馬(말 마) 耳(귀 이) 東(동녘 동) 風(바람 풍)","meaning":"남의 말을 귀담아듣지 않고 흘려버림","story":"말의 귀에 봄바람이 스쳐 지나가도 말은 아무런 느낌이 없다는 데서 나온 말로, 아무리 좋은 말을 해줘도 흘려듣는 태도를 뜻해요.","example":"동생은 내 충고를 마이동풍으로 흘려듣고 또 같은 실수를 했다.","category":"학교생활·태도"}];

<script>
/* ===== 사자성어 60 학습 앱 ===== */
"use strict";

/* ---------- 상태 관리 ---------- */
const store = {
  get(key, fallback) {
    try {
      const v = localStorage.getItem("idiom60_" + key);
      return v === null ? fallback : JSON.parse(v);
    } catch (e) { return fallback; }
  },
  set(key, value) {
    try { localStorage.setItem("idiom60_" + key, JSON.stringify(value)); } catch (e) {}
  }
};

function todayStr() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}
function yesterdayStr() {
  const d = new Date(); d.setDate(d.getDate() - 1);
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}

let state = {
  learned: store.get("learned", {}),     // { dayNum: { date, sentence } }
  streak: store.get("streak", 0),
  lastDone: store.get("lastDone", null), // 마지막 완료 날짜
  teacher: store.get("teacher", false),
  startDate: store.get("startDate", null)
};
if (!state.startDate) { state.startDate = todayStr(); store.set("startDate", state.startDate); }

function learnedCount() { return Object.keys(state.learned).length; }
function nextDay() { return Math.min(learnedCount() + 1, 60); }
function isDoneToday() { return state.lastDone === todayStr(); }
function allDone() { return learnedCount() >= 60; }

function currentTitle() {
  const n = learnedCount();
  if (n >= 60) return { name: "사자성어 박사", icon: "👑" };
  if (n >= 30) return { name: "사자성어 탐험가", icon: "🧭" };
  if (n >= 10) return { name: "사자성어 새싹", icon: "🌱" };
  return { name: "사자성어 입문자", icon: "✏️" };
}

/* ---------- 음훈 파싱 ---------- */
function parseChars(item) {
  const out = [];
  const re = /(\S)\(([^)]+)\)/g;
  let m;
  while ((m = re.exec(item.eumhun)) !== null) out.push({ hanja: m[1], eumhun: m[2] });
  return out;
}

/* ---------- 유틸 ---------- */
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function sample(arr, n, excludeIdx) {
  const pool = arr.map((v, i) => i).filter(i => i !== excludeIdx);
  return shuffle(pool).slice(0, n).map(i => arr[i]);
}
function el(id) { return document.getElementById(id); }
function esc(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

/* ---------- 화면 전환 ---------- */
function showTab(name) {
  document.querySelectorAll(".tab-view").forEach(v => v.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  el("view-" + name).classList.add("active");
  el("nav-" + name).classList.add("active");
  if (name === "today") renderToday();
  if (name === "collection") renderCollection();
  if (name === "board") renderBoard();
}

/* ---------- 헤더 ---------- */
function renderHeader() {
  const t = currentTitle();
  el("title-badge").textContent = t.icon + " " + t.name;
  el("streak-badge").textContent = "🔥 " + state.streak + "일";
  el("teacher-indicator").style.display = state.teacher ? "inline-flex" : "none";
}

/* ---------- 오늘 화면 ---------- */
function renderToday() {
  const wrap = el("today-content");
  const day = nextDay();
  const item = IDIOMS[day - 1];

  if (allDone()) {
    wrap.innerHTML =
      '<div class="hero-card done-all">' +
      '<div class="hero-stamp">完</div>' +
      '<h2>60일 완주를 축하해요! 🎉</h2>' +
      '<p>사자성어 박사가 되었어요.<br>도감에서 언제든 복습할 수 있어요.</p>' +
      '<button class="btn-primary" onclick="showTab(\'collection\')">내 도감 보러 가기</button>' +
      "</div>";
    return;
  }

  const doneToday = isDoneToday() && !state.teacher;
  if (doneToday) {
    const lastDay = learnedCount();
    const lastItem = IDIOMS[lastDay - 1];
    wrap.innerHTML =
      '<div class="hero-card">' +
      '<div class="day-eyebrow">DAY ' + lastDay + ' 완료</div>' +
      '<div class="hero-hanja small">' + esc(lastItem.hanja) + "</div>" +
      '<div class="hero-idiom">' + esc(lastItem.idiom) + "</div>" +
      '<p class="hero-meaning">' + esc(lastItem.meaning) + "</p>" +
      '<div class="stamp-mark">오늘 학습 완료!</div>' +
      '<p class="hero-sub">내일 만나요. 카드는 도감에 저장되었어요.</p>' +
      '<button class="btn-ghost" onclick="openDetail(' + (lastDay - 1) + ')">오늘 카드 다시 보기</button>' +
      "</div>";
    return;
  }

  wrap.innerHTML =
    '<div class="hero-card">' +
    '<div class="day-eyebrow">DAY ' + day + " / 60</div>" +
    '<div class="hero-hanja teaser">?</div>' +
    '<p class="hero-sub">오늘의 사자성어가 기다리고 있어요.<br>' +
    (learnedCount() > 0 ? "복습 퀴즈 3문제 후 시작해요!" : "첫 번째 사자성어를 만나 볼까요?") +
    "</p>" +
    '<button class="btn-primary big" onclick="startLearn()">오늘의 학습 시작</button>' +
    "</div>";
}

/* ---------- 학습 플로우 ---------- */
let flow = null;

function startLearn() {
  const day = nextDay();
  const item = IDIOMS[day - 1];
  const reviewPool = Object.keys(state.learned).map(d => IDIOMS[Number(d) - 1]);
  const reviews = shuffle(reviewPool).slice(0, 3).map(makeReviewQ);
  flow = { day, item, chars: parseChars(item), step: 0, reviews, reviewIdx: 0, quizIdx: 0, quizzes: null, storyIdx: 0 };
  flow.stories = item.story.split(". ").map((s, i, a) => (i < a.length - 1 ? s + "." : s)).filter(s => s.trim());
  el("learn-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
  if (reviews.length > 0) renderReview();
  else { flow.step = 1; renderStep(); }
}

function closeLearn() {
  el("learn-overlay").classList.remove("open");
  document.body.style.overflow = "";
  flow = null;
  renderToday();
  renderHeader();
}

function makeReviewQ(item) {
  const others = sample(IDIOMS, 3, item.day - 1).map(o => o.idiom);
  const options = shuffle([item.idiom].concat(others));
  return { q: item.meaning, answer: item.idiom, options, hanja: item.hanja };
}

function renderReview() {
  const r = flow.reviews[flow.reviewIdx];
  el("learn-body").innerHTML =
    '<div class="step-eyebrow">복습 퀴즈 ' + (flow.reviewIdx + 1) + " / " + flow.reviews.length + "</div>" +
    '<h3 class="quiz-q">이 뜻을 가진 사자성어는?</h3>' +
    '<div class="quiz-meaning">“' + esc(r.q) + '”</div>' +
    '<div class="quiz-options">' +
    r.options.map(o => '<button class="quiz-opt" onclick="answerReview(this, \'' + esc(o) + '\')">' + esc(o) + "</button>").join("") +
    "</div>" +
    '<div id="quiz-feedback"></div>';
  renderProgress("복습");
}

function answerReview(btn, choice) {
  const r = flow.reviews[flow.reviewIdx];
  const correct = choice === r.answer;
  markAnswer(btn, correct, r.answer);
  setTimeout(() => {
    flow.reviewIdx++;
    if (flow.reviewIdx < flow.reviews.length) renderReview();
    else { flow.step = 1; renderStep(); }
  }, correct ? 900 : 1600);
}

function markAnswer(btn, correct, answer) {
  document.querySelectorAll(".quiz-opt").forEach(b => {
    b.disabled = true;
    if (b.textContent === answer) b.classList.add("correct");
  });
  if (!correct) btn.classList.add("wrong");
  el("quiz-feedback").innerHTML = correct
    ? '<div class="fb ok">딩동댕! 정답이에요 🎉</div>'
    : '<div class="fb no">아쉬워요! 정답은 “' + esc(answer) + '”</div>';
}

function renderProgress(label) {
  const steps = ["만나기", "이야기", "이해", "퀴즈", "완료"];
  el("learn-progress").innerHTML =
    (label === "복습" ? '<span class="prog-review">복습</span>' : "") +
    steps.map((s, i) =>
      '<span class="prog-dot' + (flow.step === i + 1 ? " on" : flow.step > i + 1 ? " past" : "") + '">' + s + "</span>"
    ).join('<span class="prog-line"></span>');
}

function renderStep() {
  renderProgress();
  const it = flow.item;
  const body = el("learn-body");

  if (flow.step === 1) {
    body.innerHTML =
      '<div class="step-eyebrow">DAY ' + flow.day + " · 오늘의 사자성어</div>" +
      '<div class="flip-scene" onclick="flipCard(this)">' +
      '<div class="flip-card"><div class="flip-front"><span>탭해서<br>뒤집기</span></div>' +
      '<div class="flip-back"><div class="big-hanja">' + esc(it.hanja) + "</div>" +
      '<div class="big-idiom">' + esc(it.idiom) + "</div>" +
      '<div class="cat-tag">' + esc(it.category) + "</div></div></div></div>" +
      '<div class="eumhun-row">' + flow.chars.map(c =>
        '<div class="eum-chip"><span class="eum-hanja">' + esc(c.hanja) + '</span><span class="eum-txt">' + esc(c.eumhun) + "</span></div>"
      ).join("") + "</div>" +
      '<button class="btn-primary" id="step1-next" style="visibility:hidden" onclick="nextStep()">이야기 들으러 가기</button>';
  }

  if (flow.step === 2) {
    body.innerHTML =
      '<div class="step-eyebrow">어원 이야기</div>' +
      '<div class="story-idiom">' + esc(it.idiom) + " " + esc(it.hanja) + "</div>" +
      '<div class="story-box" id="story-box"></div>' +
      '<button class="btn-primary" id="story-btn" onclick="nextStory()">다음 문장 ▸</button>';
    flow.storyIdx = 0;
    nextStory();
  }

  if (flow.step === 3) {
    body.innerHTML =
      '<div class="step-eyebrow">뜻 이해하기</div>' +
      '<div class="story-idiom">' + esc(it.idiom) + "</div>" +
      '<div class="meaning-card">' + esc(it.meaning) + "</div>" +
      '<div class="eumhun-grid">' + flow.chars.map(c =>
        '<div class="eum-card"><div class="eum-card-hanja">' + esc(c.hanja) + '</div><div class="eum-card-txt">' + esc(c.eumhun) + "</div></div>"
      ).join("") + "</div>" +
      '<div class="example-line">💬 “' + esc(it.example) + '”</div>' +
      '<button class="btn-primary" onclick="buildQuiz()">퀴즈 도전!</button>';
  }

  if (flow.step === 4) renderQuiz();

  if (flow.step === 5) {
    body.innerHTML =
      '<div class="step-eyebrow">DAY ' + flow.day + " 완료</div>" +
      '<div class="stamp-zone"><div class="stamp-seal" id="stamp-seal">' + esc(it.idiom[0]) + "</div></div>" +
      '<h3 class="done-title">' + esc(it.idiom) + " 카드 획득!</h3>" +
      '<p class="done-sub">오늘 배운 사자성어로 나만의 문장을 만들어 볼까요?</p>' +
      '<textarea id="my-sentence" class="sentence-input" rows="2" placeholder="예) ' + esc(it.example) + '"></textarea>' +
      '<button class="btn-primary" onclick="finishDay()">저장하고 마치기</button>' +
      '<button class="btn-ghost" onclick="finishDay(true)">건너뛰기</button>';
    setTimeout(() => el("stamp-seal").classList.add("stamped"), 150);
  }
}

function flipCard(scene) {
  scene.querySelector(".flip-card").classList.add("flipped");
  el("step1-next").style.visibility = "visible";
}

function nextStory() {
  const box = el("story-box");
  if (flow.storyIdx < flow.stories.length) {
    const p = document.createElement("p");
    p.className = "story-sent";
    p.textContent = flow.stories[flow.storyIdx];
    box.appendChild(p);
    requestAnimationFrame(() => p.classList.add("show"));
    flow.storyIdx++;
  }
  if (flow.storyIdx >= flow.stories.length) {
    el("story-btn").textContent = "뜻 이해하러 가기";
    el("story-btn").onclick = nextStep;
  }
}

function nextStep() { flow.step++; renderStep(); }

/* ---------- 오늘의 퀴즈 3문제 ---------- */
function buildQuiz() {
  const it = flow.item;
  const idx = flow.day - 1;
  const quizzes = [];

  // Q1 뜻 고르기
  const mOthers = sample(IDIOMS, 3, idx).map(o => o.meaning);
  quizzes.push({ type: "meaning", q: "‘" + it.idiom + "’의 뜻은 무엇일까요?", answer: it.meaning, options: shuffle([it.meaning].concat(mOthers)) });

  // Q2 예문 빈칸
  const iOthers = sample(IDIOMS, 3, idx).map(o => o.idiom);
  quizzes.push({ type: "blank", q: "빈칸에 알맞은 사자성어는?", sentence: it.example.replace(it.idiom, "◯◯◯◯"), answer: it.idiom, options: shuffle([it.idiom].concat(iOthers)) });

  // Q3 음훈 맞히기
  const ch = flow.chars[Math.floor(Math.random() * flow.chars.length)];
  const pool = [];
  IDIOMS.forEach((o, i) => { if (i !== idx) parseChars(o).forEach(c => { if (c.eumhun !== ch.eumhun) pool.push(c.eumhun); }); });
  const eOthers = shuffle(Array.from(new Set(pool))).slice(0, 3);
  quizzes.push({ type: "eumhun", q: "한자 ‘" + ch.hanja + "’의 음과 훈은?", answer: ch.eumhun, options: shuffle([ch.eumhun].concat(eOthers)), bigChar: ch.hanja });

  flow.quizzes = quizzes;
  flow.quizIdx = 0;
  flow.step = 4;
  renderStep();
}

function renderQuiz() {
  renderProgress();
  const q = flow.quizzes[flow.quizIdx];
  let extra = "";
  if (q.type === "blank") extra = '<div class="quiz-meaning">“' + esc(q.sentence) + '”</div>';
  if (q.type === "eumhun") extra = '<div class="quiz-bigchar">' + esc(q.bigChar) + "</div>";
  el("learn-body").innerHTML =
    '<div class="step-eyebrow">오늘의 퀴즈 ' + (flow.quizIdx + 1) + " / 3</div>" +
    '<h3 class="quiz-q">' + esc(q.q) + "</h3>" + extra +
    '<div class="quiz-options">' +
    q.options.map((o, i) => '<button class="quiz-opt" data-i="' + i + '" onclick="answerQuiz(this)">' + esc(o) + "</button>").join("") +
    "</div>" +
    '<div id="quiz-feedback"></div>';
}

function answerQuiz(btn) {
  const q = flow.quizzes[flow.quizIdx];
  const choice = q.options[Number(btn.dataset.i)];
  const correct = choice === q.answer;
  markAnswer(btn, correct, q.answer);
  setTimeout(() => {
    flow.quizIdx++;
    if (flow.quizIdx < 3) renderQuiz();
    else { flow.step = 5; renderStep(); }
  }, correct ? 900 : 1700);
}

/* ---------- 완료 처리 ---------- */
function finishDay(skip) {
  const sentence = skip ? "" : (el("my-sentence") ? el("my-sentence").value.trim() : "");
  const today = todayStr();
  state.learned[flow.day] = { date: today, sentence };

  if (state.lastDone !== today) {
    state.streak = (state.lastDone === yesterdayStr()) ? state.streak + 1 : 1;
    state.lastDone = today;
  }
  store.set("learned", state.learned);
  store.set("streak", state.streak);
  store.set("lastDone", state.lastDone);

  const n = learnedCount();
  closeLearn();
  if (n === 10 || n === 30 || n === 60) showTitleUp();
}

function showTitleUp() {
  const t = currentTitle();
  const m = el("titleup-modal");
  el("titleup-body").innerHTML =
    '<div class="titleup-icon">' + t.icon + "</div>" +
    '<h3>칭호 획득!</h3><div class="titleup-name">' + esc(t.name) + "</div>" +
    '<p>' + learnedCount() + "개의 사자성어를 배웠어요!</p>" +
    '<button class="btn-primary" onclick="el(\'titleup-modal\').classList.remove(\'open\')">좋아요!</button>';
  m.classList.add("open");
}

/* ---------- 도감 ---------- */
function renderCollection() {
  const wrap = el("collection-grid");
  el("collection-count").textContent = learnedCount() + " / 60";
  wrap.innerHTML = IDIOMS.map((it, i) => {
    const got = state.learned[it.day];
    if (got) {
      return '<button class="col-card got" onclick="openDetail(' + i + ')">' +
        '<span class="col-hanja">' + esc(it.hanja[0]) + "</span>" +
        '<span class="col-name">' + esc(it.idiom) + "</span>" +
        '<span class="col-day">DAY ' + it.day + "</span></button>";
    }
    return '<div class="col-card locked"><span class="col-hanja">?</span><span class="col-name">???</span><span class="col-day">DAY ' + it.day + "</span></div>";
  }).join("");
}

function openDetail(i) {
  const it = IDIOMS[i];
  const got = state.learned[it.day];
  const chars = parseChars(it);
  el("detail-body").innerHTML =
    '<div class="cat-tag">' + esc(it.category) + "</div>" +
    '<div class="big-hanja detail">' + esc(it.hanja) + "</div>" +
    '<div class="big-idiom">' + esc(it.idiom) + "</div>" +
    '<div class="eumhun-grid">' + chars.map(c =>
      '<div class="eum-card"><div class="eum-card-hanja">' + esc(c.hanja) + '</div><div class="eum-card-txt">' + esc(c.eumhun) + "</div></div>"
    ).join("") + "</div>" +
    '<div class="detail-sec"><h4>뜻</h4><p>' + esc(it.meaning) + "</p></div>" +
    '<div class="detail-sec"><h4>어원 이야기</h4><p>' + esc(it.story) + "</p></div>" +
    '<div class="detail-sec"><h4>생활 속 예문</h4><p class="ex">“' + esc(it.example) + '”</p></div>' +
    (got && got.sentence ? '<div class="detail-sec mine"><h4>내가 만든 문장</h4><p>“' + esc(got.sentence) + '”</p></div>' : "") +
    '<button class="btn-primary" onclick="el(\'detail-modal\').classList.remove(\'open\')">닫기</button>';
  el("detail-modal").classList.add("open");
}

/* ---------- 도장판 ---------- */
function renderBoard() {
  const wrap = el("board-grid");
  el("board-count").textContent = learnedCount() + "개 완료 · " + currentTitle().icon + " " + currentTitle().name;
  wrap.innerHTML = IDIOMS.map(it => {
    const got = state.learned[it.day];
    const isNext = !got && it.day === nextDay() && !allDone();
    if (got) return '<div class="cell done" title="' + esc(it.idiom) + '"><span>' + esc(it.idiom[0]) + "</span></div>";
    if (isNext) return '<div class="cell next">' + it.day + "</div>";
    return '<div class="cell">' + it.day + "</div>";
  }).join("");

  el("badge-row").innerHTML = [
    { at: 10, icon: "🌱", name: "새싹" },
    { at: 30, icon: "🧭", name: "탐험가" },
    { at: 60, icon: "👑", name: "박사" }
  ].map(b =>
    '<div class="badge' + (learnedCount() >= b.at ? " earned" : "") + '"><span class="badge-icon">' + b.icon + '</span><span>' + b.name + "</span><span class=\"badge-at\">" + b.at + "개</span></div>"
  ).join("");
}

/* ---------- 설정 / 선생님 모드 ---------- */
function openSettings() {
  el("teacher-toggle").checked = state.teacher;
  el("settings-modal").classList.add("open");
}
function toggleTeacher(cb) {
  state.teacher = cb.checked;
  store.set("teacher", state.teacher);
  renderHeader();
  renderToday();
}
function resetAll() {
  if (!confirm("모든 학습 기록이 삭제됩니다. 정말 처음부터 다시 시작할까요?")) return;
  ["learned", "streak", "lastDone", "startDate"].forEach(k => localStorage.removeItem("idiom60_" + k));
  location.reload();
}

/* ---------- 스트릭 유지 확인 ---------- */
(function checkStreak() {
  if (state.lastDone && state.lastDone !== todayStr() && state.lastDone !== yesterdayStr()) {
    state.streak = 0;
    store.set("streak", 0);
  }
})();

/* ---------- 초기화 ---------- */
window.addEventListener("DOMContentLoaded", () => {
  renderHeader();
  showTab("today");
});

</script>
